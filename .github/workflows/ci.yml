name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify MVP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test backend
        run: pnpm --filter @expenses-tracker/backend test

      - name: Build backend
        run: pnpm --filter @expenses-tracker/backend build

      - name: Test frontend
        run: pnpm --filter @expenses-tracker/frontend test -- --browsers=ChromeHeadless

      - name: Build frontend
        run: pnpm --filter @expenses-tracker/frontend build

      - name: Validate Docker Compose
        run: docker compose config --quiet
