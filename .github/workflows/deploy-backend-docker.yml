name: Deploy expenses-tracker backend

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/expenses-tracker-backend
  CONTAINER_DIR: /opt/apps/expenses-tracker/backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --filter @expenses-tracker/backend test

      - name: Run backend build
        run: pnpm --filter @expenses-tracker/backend build

      - name: Normalize image name
        run: |
          echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_deploy_key
          chmod 600 ~/.ssh/oracle_deploy_key
          ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Oracle VM
        run: |
          ssh -i ~/.ssh/oracle_deploy_key \
            ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} << EOF
              set -e

              cd "${{ env.CONTAINER_DIR }}"

              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io \
                -u "${{ secrets.GHCR_USERNAME }}" \
                --password-stdin

              docker compose pull expenses-tracker-backend
              docker compose run --rm --no-deps expenses-tracker-backend node dist/infrastructure/db-runner.js bootstrap
              docker compose up -d --force-recreate --remove-orphans expenses-tracker-backend

              for attempt in $(seq 1 30); do
                if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
                  break
                fi

                if [ "$attempt" -eq 30 ]; then
                  echo "Backend failed health check after deploy."
                  docker compose ps
                  docker logs --tail=200 expenses-tracker-backend || true
                  exit 1
                fi

                sleep 2
              done

              docker image prune -f
          EOF

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/oracle_deploy_key \
            ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} \
            "sudo systemctl reload nginx"
